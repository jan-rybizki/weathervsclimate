<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather vs Climate (Open-Meteo + Leaflet)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 1000px; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin: .5rem 0; }
    input, button { font-size: 1rem; padding: .5rem; }
    #map { height: 420px; margin-top: 1rem; border-radius: 8px; }
    #result { margin-top: 1rem; }
    #metrics { margin: 1rem 0; font-weight: 600; }
    .chart-block { margin-top: 1.25rem; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: .35rem; }
    .chart-delta { font-weight: 600; color: #1d3557; }
    canvas { width: 100% !important; height: 420px !important; max-width: 100%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <h1>Weather vs Climate</h1>
  <p>Frontend-only prototype using Open-Meteo APIs only. Pick a location on the map (starts with approximate network location), then compare current values with the 30-year climate mean (1961-1990).</p>

  <div class="row">
    <button id="use-gps-btn">Use precise browser GPS</button>
    <button id="compare-btn">Load Open-Meteo Data</button>
  </div>

  <div id="map"></div>
  <div id="result"></div>
  <div id="metrics"></div>

  <div class="chart-block">
    <div class="chart-header">
      <strong>🌡️ Temperature plot</strong>
      <span id="tempYearDelta" class="chart-delta"></span>
    </div>
    <canvas id="tempChart"></canvas>
  </div>
  <div class="chart-block">
    <div class="chart-header">
      <strong>💧 Precipitation plot</strong>
      <span id="rainYearDelta" class="chart-delta"></span>
    </div>
    <canvas id="rainChart"></canvas>
  </div>

  <script>
    let tempChartInstance = null;
    let rainChartInstance = null;
    let map;
    let marker;
    let selectedLat = 52.52;
    let selectedLon = 13.405;

    function toIsoDateUTC(d) {
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function mean(arr) {
      const v = arr.filter(Number.isFinite);
      return v.length ? v.reduce((a,b) => a+b, 0) / v.length : null;
    }

    function monthLabels() {
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    }

    async function fetchOpenMeteoDaily(lat, lon, startDate, endDate) {
      const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${startDate}&end_date=${endDate}&daily=temperature_2m_mean,precipitation_sum&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`Open-Meteo failed (${r.status})`);
      const data = await r.json();
      if (!data.daily?.time || !data.daily?.temperature_2m_mean || !data.daily?.precipitation_sum) {
        throw new Error('Open-Meteo daily data missing');
      }
      return data.daily;
    }

    function last12MonthsFromDaily(daily) {
      const tempSums = new Array(12).fill(0);
      const tempCounts = new Array(12).fill(0);
      const rainMonthly = new Array(12).fill(0);

      daily.time.forEach((dateStr, i) => {
        const m = Number(dateStr.slice(5, 7)) - 1;
        if (m < 0 || m > 11) return;

        const t = daily.temperature_2m_mean[i];
        if (Number.isFinite(t)) {
          tempSums[m] += t;
          tempCounts[m] += 1;
        }

        const p = daily.precipitation_sum[i];
        if (Number.isFinite(p)) {
          rainMonthly[m] += p;
        }
      });

      return {
        tempMonthlyMean: tempSums.map((s, i) => tempCounts[i] ? Number((s / tempCounts[i]).toFixed(2)) : null),
        rainMonthlyTotal: rainMonthly.map((v) => Number(v.toFixed(2)))
      };
    }

    function climateMean1961To1990FromDaily(daily) {
      const tempSums = new Array(12).fill(0);
      const tempCounts = new Array(12).fill(0);

      const rainByYearMonth = new Map();

      daily.time.forEach((dateStr, i) => {
        const year = Number(dateStr.slice(0, 4));
        const month = Number(dateStr.slice(5, 7)) - 1;
        if (month < 0 || month > 11) return;

        const t = daily.temperature_2m_mean[i];
        if (Number.isFinite(t)) {
          tempSums[month] += t;
          tempCounts[month] += 1;
        }

        const p = daily.precipitation_sum[i];
        if (Number.isFinite(p)) {
          const key = `${year}-${month}`;
          rainByYearMonth.set(key, (rainByYearMonth.get(key) || 0) + p);
        }
      });

      const rainMonthSums = new Array(12).fill(0);
      const rainMonthCounts = new Array(12).fill(0);
      for (const [key, total] of rainByYearMonth.entries()) {
        const month = Number(key.split('-')[1]);
        rainMonthSums[month] += total;
        rainMonthCounts[month] += 1;
      }

      return {
        tempMonthlyMean: tempSums.map((s, i) => tempCounts[i] ? Number((s / tempCounts[i]).toFixed(2)) : null),
        rainMonthlyMeanTotal: rainMonthSums.map((s, i) => rainMonthCounts[i] ? Number((s / rainMonthCounts[i]).toFixed(2)) : null)
      };
    }

    function updateSelectionText(sourceLabel) {
      document.getElementById('result').innerHTML = `<p><strong>${sourceLabel}</strong> | <strong>Lat/Lon:</strong> ${selectedLat.toFixed(5)}, ${selectedLon.toFixed(5)}</p>`;
    }

    function setMarker(lat, lon, sourceLabel) {
      selectedLat = lat;
      selectedLon = lon;
      marker.setLatLng([lat, lon]);
      map.panTo([lat, lon]);
      updateSelectionText(sourceLabel);
    }

    async function getIpApproxLocation() {
      const r = await fetch('https://ipapi.co/json/');
      if (!r.ok) throw new Error('IP location service unavailable');
      const data = await r.json();
      if (!Number.isFinite(data.latitude) || !Number.isFinite(data.longitude)) {
        throw new Error('IP location did not return coordinates');
      }
      return { lat: data.latitude, lon: data.longitude, city: data.city, country: data.country_name };
    }

    async function initMap() {
      map = L.map('map').setView([selectedLat, selectedLon], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      marker = L.marker([selectedLat, selectedLon], { draggable: true }).addTo(map);
      marker.on('dragend', () => {
        const p = marker.getLatLng();
        selectedLat = p.lat;
        selectedLon = p.lng;
        updateSelectionText('Location manually adjusted on map');
      });

      map.on('click', (e) => setMarker(e.latlng.lat, e.latlng.lng, 'Location selected by map click'));

      try {
        const ipLoc = await getIpApproxLocation();
        setMarker(ipLoc.lat, ipLoc.lon, `Approximate network location: ${ipLoc.city || 'Unknown city'}, ${ipLoc.country || 'Unknown country'}`);
        map.setZoom(9);
      } catch (e) {
        updateSelectionText('Using default location (network location unavailable)');
      }
    }



    function monthlyPointsByYear(daily, years) {
      const tempSums = new Map();
      const tempCounts = new Map();
      const rainSums = new Map();

      daily.time.forEach((dateStr, i) => {
        const year = Number(dateStr.slice(0, 4));
        const month = Number(dateStr.slice(5, 7)) - 1;
        const key = `${year}-${month}`;

        const t = daily.temperature_2m_mean[i];
        if (Number.isFinite(t)) {
          tempSums.set(key, (tempSums.get(key) || 0) + t);
          tempCounts.set(key, (tempCounts.get(key) || 0) + 1);
        }

        const p = daily.precipitation_sum[i];
        if (Number.isFinite(p)) rainSums.set(key, (rainSums.get(key) || 0) + p);
      });

      const tempByYear = years.map((year) => new Array(12).fill(null).map((_, month) => {
        const key = `${year}-${month}`;
        const c = tempCounts.get(key) || 0;
        return c ? Number((tempSums.get(key) / c).toFixed(2)) : null;
      }));
      const rainByYear = years.map((year) => new Array(12).fill(null).map((_, month) => {
        const key = `${year}-${month}`;
        const v = rainSums.get(key);
        return Number.isFinite(v) ? Number(v.toFixed(2)) : null;
      }));

      return { labels: monthLabels(), tempByYear, rainByYear };
    }

    function computeAxisBounds(seriesList, padRatio = 0.08) {
      const flat = seriesList.flat().filter(Number.isFinite);
      if (!flat.length) return undefined;
      const min = Math.min(...flat);
      const max = Math.max(...flat);
      if (min === max) {
        const pad = Math.max(1, Math.abs(min) * padRatio);
        return { min: Number((min - pad).toFixed(2)), max: Number((max + pad).toFixed(2)) };
      }
      const span = max - min;
      const pad = span * padRatio;
      return { min: Number((min - pad).toFixed(2)), max: Number((max + pad).toFixed(2)) };
    }
    async function runComparison() {
      const metrics = document.getElementById('metrics');
      metrics.textContent = '';
      if (tempChartInstance) tempChartInstance.destroy();
      if (rainChartInstance) rainChartInstance.destroy();
      document.getElementById('tempChart').scrollIntoView({ behavior: 'smooth', block: 'start' });

      const now = new Date();
      const currentYear = now.getUTCFullYear();
      const years = [currentYear - 2, currentYear - 1, currentYear];
      const startStr = `${years[0]}-01-01`;
      const endStr = toIsoDateUTC(now);

      try {
        const [currentDaily, climateDaily] = await Promise.all([
          fetchOpenMeteoDaily(selectedLat, selectedLon, startStr, endStr),
          fetchOpenMeteoDaily(selectedLat, selectedLon, '1961-01-01', '1990-12-31')
        ]);

        const current = monthlyPointsByYear(currentDaily, years);
        const climate = climateMean1961To1990FromDaily(climateDaily);
        const climateTempForRange = climate.tempMonthlyMean;
        const climateRainForRange = climate.rainMonthlyMeanTotal;
        const curTempMean = mean(current.tempByYear.flat());
        const climateTempMean = mean(climateTempForRange);
        const tempDelta = (Number.isFinite(climateTempMean) && Number.isFinite(curTempMean)) ? (curTempMean - climateTempMean) : null;

        const curRainMean = mean(current.rainByYear.flat());
        const climateRainMean = mean(climateRainForRange);
        const rainDeltaPercent = (Number.isFinite(climateRainMean) && climateRainMean !== 0 && Number.isFinite(curRainMean)) ? ((curRainMean - climateRainMean) / climateRainMean) * 100 : null;

        metrics.textContent = `Comparing ${years[0]}-01-01 to ${endStr} with the 1961-1990 monthly mean (same coordinates).`;
        document.getElementById('tempYearDelta').textContent = tempDelta === null
          ? 'Mean Δ unavailable'
          : `Mean Δ: ${tempDelta >= 0 ? '+' : ''}${tempDelta.toFixed(2)} °C`;
        document.getElementById('rainYearDelta').textContent = rainDeltaPercent === null
          ? 'Mean Δ unavailable'
          : `Mean Δ: ${rainDeltaPercent >= 0 ? '+' : ''}${rainDeltaPercent.toFixed(1)} %`;

        const tempBounds = computeAxisBounds([...current.tempByYear, climateTempForRange]);
        const rainBounds = computeAxisBounds([...current.rainByYear, climateRainForRange]);
        const colors = ['#3a86ff', '#ff006e', '#fb5607'];

        tempChartInstance = new Chart(document.getElementById('tempChart'), {
          type: 'line',
          data: {
            labels: monthLabels(),
            datasets: [
              { label: `${years[2]} monthly mean (Open-Meteo)`, data: current.tempByYear[2], borderColor: colors[0], tension: .2 },
              { label: `${years[1]} monthly mean (Open-Meteo)`, data: current.tempByYear[1], borderColor: colors[1], tension: .2 },
              { label: `${years[0]} monthly mean (Open-Meteo)`, data: current.tempByYear[0], borderColor: colors[2], tension: .2 },
              { label: '1961-1990 monthly mean (Open-Meteo)', data: climateTempForRange, borderColor: '#457b9d', borderDash: [5, 5], tension: .2 }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `🌡️ Temperature: ${years[0]}-${years[2]} (Jan-Dec)` } }, scales: { y: { min: tempBounds?.min, max: tempBounds?.max, title: { display: true, text: '°C' } } } }
        });

        rainChartInstance = new Chart(document.getElementById('rainChart'), {
          type: 'line',
          data: {
            labels: monthLabels(),
            datasets: [
              { label: `${years[2]} monthly precipitation total (Open-Meteo)`, data: current.rainByYear[2], borderColor: colors[0], tension: .2 },
              { label: `${years[1]} monthly precipitation total (Open-Meteo)`, data: current.rainByYear[1], borderColor: colors[1], tension: .2 },
              { label: `${years[0]} monthly precipitation total (Open-Meteo)`, data: current.rainByYear[0], borderColor: colors[2], tension: .2 },
              { label: '1961-1990 monthly precipitation mean (Open-Meteo)', data: climateRainForRange, borderColor: '#264653', borderDash: [5, 5], tension: .2 }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `💧 Precipitation: ${years[0]}-${years[2]} (Jan-Dec)` } }, scales: { y: { min: rainBounds?.min, max: rainBounds?.max, title: { display: true, text: 'mm' } } } }
        });
      } catch (e) {
        document.getElementById('result').textContent = `Error: ${e.message}`;
      }
    }

    document.getElementById('use-gps-btn').addEventListener('click', () => {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => setMarker(pos.coords.latitude, pos.coords.longitude, 'Precise browser GPS location'),
        () => updateSelectionText('GPS permission denied, keep current map location')
      );
    });

    document.getElementById('compare-btn').addEventListener('click', runComparison);
    initMap();
  </script>
</body>
</html>
